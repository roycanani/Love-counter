<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown to Feb 25, 19:20 GMT</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Countdown</h1>
    <p class="subtitle">Until February 25, 19:20 GMT (21:20 Israel time)</p>

    <section class="timer" aria-live="polite" aria-atomic="true">
      <div class="unit">
        <span id="days" class="value">00</span>
        <span class="label">Days</span>
      </div>
      <div class="unit">
        <span id="hours" class="value">00</span>
        <span class="label">Hours</span>
      </div>
      <div class="unit">
        <span id="minutes" class="value">00</span>
        <span class="label">Minutes</span>
      </div>
      <div class="unit">
        <span id="seconds" class="value">00</span>
        <span class="label">Seconds</span>
      </div>
    </section>

    <p id="target-info" class="target-info"></p>
    <p id="status" class="status"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
